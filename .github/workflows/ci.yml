name: azmsi-plugins CI

# Runs moodle-plugin-ci for each of the four plugins against Moodle branch 501.
# Each plugin is checked independently (matrix), so a failure points at one
# component. The plugins are currently independent skeletons; when real
# cross-plugin dependencies appear (e.g. block/format consuming local_azmsi WS),
# add the siblings via `--extra-plugins-dir` here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: ${{ matrix.plugin }} (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Moodle 5.1 is the only target branch (supported = [501, 501]).
        moodle-branch: [MOODLE_501_STABLE]
        php: ['8.4', '8.5']
        plugin:
          - theme/azmsi
          - local/azmsi
          - course/format/emd
          - blocks/azmsi_dashboard

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: 'root'
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_CHARACTER_SET_SERVER: "utf8mb4"
          MYSQL_COLLATION_SERVER: "utf8mb4_unicode_ci"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=5

    env:
      DB: mariadb
      MOODLE_BRANCH: ${{ matrix.moodle-branch }}

    steps:
      - name: Check out azmsi-plugins
        uses: actions/checkout@v4
        with:
          # moodle-plugin-ci expects the plugin under test in its own dir.
          path: plugin-repo

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pgsql, mysqli, gd, zip, intl, soap, xmlrpc
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci/bin && pwd)" >> "$GITHUB_PATH"
          echo "$(cd ci/vendor/bin && pwd)" >> "$GITHUB_PATH"

      - name: Install Moodle + plugin (${{ matrix.plugin }})
        run: moodle-plugin-ci install --plugin plugin-repo/${{ matrix.plugin }} --db-host=127.0.0.1
        env:
          IGNORE_PATHS: ''

      # --- Static analysis & lint gates ---
      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint
      - name: PHP Mess Detector
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd
      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcs --max-warnings 0
      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc
      - name: Validate
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate
      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints
      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache
      - name: Grunt
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci grunt

      # --- Tests (gracefully pass when a plugin has no tests yet) ---
      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit
      - name: Behat features
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome
